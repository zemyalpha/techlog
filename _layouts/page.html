---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}
    <div class="post-meta">
      <time>{{ page.date | date: '%Y년 %m월 %d일' }}</time>
    </div>
    {% endif %}
    {% if page.tags %}
    <div class="card-tags" style="margin-top:8px;">
      {% for t in page.tags %}<span class="tag">{{ t }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
