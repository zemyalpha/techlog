---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: '%Y년 %m월 %d일' }}
      </time>
      {% if page.keywords %}
      <span class="post-tags">
        {% for kw in page.keywords %}
        <span class="tag">{{ kw }}</span>
        {% endfor %}
      </span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}" class="post-nav">&larr; {{ page.previous.title }}</a>
    {% endif %}
    {% if page.next %}
    <a href="{{ page.next.url | relative_url }}" class="post-nav">{{ page.next.title }} &rarr;</a>
    {% endif %}
  </footer>
</article>
